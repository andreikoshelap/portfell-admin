spring:
  application:
    name: portfell
  config:
    import: optional:file:.env[.properties]
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  address: ${SERVER_ADDRESS:127.0.0.1}
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: ${SERVER_CONTEXT_PATH:/portfell-admin}

app:
  upload:
    directory: ${UPLOAD_DIRECTORY:/var/www/gatto/portfell}
